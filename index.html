<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buser Mimarlık | Minimalist Tasarım</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* GENEL AYARLAR */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: #fff;
            color: #333;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* GİRİŞ ANİMASYONU */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate {
            animation: fadeInUp 1s ease-out forwards;
        }

        /* NAVİGASYON (MENÜ) */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 10%;
            position: fixed;
            width: 100%;
            background: white;
            z-index: 1000;
        }

        .logo {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .nav-links {
            list-style: none;
            display: flex;
        }

        .nav-links li {
            margin-left: 30px;
        }

        .nav-links a {
            text-decoration: none;
            color: #333;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: #999;
        }

        /* HERO BÖLÜMÜ (GİRİŞ) */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 10%;
        }

        .hero h1 {
            font-size: 3rem;
            font-weight: 300;
            margin-bottom: 20px;
            letter-spacing: 5px;
        }

        .hero p {
            font-size: 1.1rem;
            color: #777;
            max-width: 600px;
        }

        /* PROJELER (GRID) */
        .projects {
            padding: 100px 10%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            grid-gap: 40px;
        }

        .project-card {
            position: relative;
            overflow: hidden;
            background-color: #f4f4f4;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.5s;
            cursor: pointer;
        }

        .project-card:hover {
            transform: scale(0.98);
            background-color: #eee;
        }

        .project-card img {
            max-width: 100%;
            height: auto;
            opacity: 0.8;
        }

        .project-info {
            position: absolute;
            bottom: 20px;
            left: 20px;
        }

        /* ALT BİLGİ (FOOTER) */
        footer {
            padding: 50px 10%;
            text-align: center;
            border-top: 1px solid #eee;
            font-size: 0.8rem;
            color: #999;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">BUSER</div>
        <ul class="nav-links">
            <li><a href="#">Projeler</a></li>
            <li><a href="#">Ofis</a></li>
            <li><a href="#">İletişim</a></li>
        </ul>
    </nav>

    <section class="hero animate">
        <h1>BUSER MİMARLIK</h1>
        <p>Geleceğin yapılarını minimalist dokunuşlarla inşa ediyoruz. Estetik ve fonksiyonelliğin buluştuğu nokta.</p>
    </section>

    <section class="projects animate" style="animation-delay: 0.5s;">
        <div class="project-card">
            <div class="project-info"><h3>Konut Projesi I</h3></div>
        </div>
        <div class="project-card">
            <div class="project-info"><h3>Modern Ofis</h3></div>
        </div>
        <div class="project-card">
            <div class="project-info"><h3>Kentsel Dönüşüm</h3></div>
        </div>
    </section>

    <footer>
        &copy; 2024 Buser Mimarlık. Tüm Hakları Saklıdır.
    </footer>

</body>
</html>
